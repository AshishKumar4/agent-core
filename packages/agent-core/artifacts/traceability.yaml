      "id": "NC-INTERCEPTORS",
      "summary": "Runtime interceptor ordering, execution, durable persistence, and replay lookup are not modeled; only structural ordered per-item transformation association is modeled.",
      "status": "specified-not-modeled"
    },
    {
      "id": "NC-ENVIRONMENT-LIFECYCLE",
      "summary": "Environment and Session provisioning, rotation, checkpoint, provider, and runtime lifecycle semantics are not modeled.",
      "status": "specified-not-modeled"
    },
    {
      "id": "NC-ENVIRONMENT-TURN-OWNED-DIRECT-EXECUTE",
