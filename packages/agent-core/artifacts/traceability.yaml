modelAssumptions:
  - authenticated callers map to the correct abstract Principal or Domain
  - concrete storage linearizes abstract transitions
  - concrete Facet implementations refine their profile contracts
  - concrete Event payload schemas and visibility policies refine the abstract Event model
  - concrete Subscription routers refine the abstract matching and dedupe model
  - concrete runtime membranes enforce the modeled protection domains
