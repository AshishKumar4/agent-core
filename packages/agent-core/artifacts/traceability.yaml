      - AgentCore.start_turn_requires_run_branch
      - AgentCore.start_turn_initial_lease
      - AgentCore.claim_turn_requires_claimable_and_increases_epoch
      - AgentCore.spawn_turn_requires_running_parent
      - AgentCore.retry_turn_requires_retryable_parent
      - AgentCore.resume_turn_increases_lease_epoch
      - AgentCore.terminal_status_cannot_transition
    remainingEvidence:
      - full lease renewal and reclaim protocol
      - checkpoint and cancellation refinement
      - refinement from the abstract lifecycle to the durable Run plus Turn records
  AC-RUNBRANCH-001:
