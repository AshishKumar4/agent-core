# Machine-verified against the Lean axiom report by `pnpm check:traceability`
# (scripts/check-traceability.mjs). Every name under `theorems:` must appear in the
# `#print axioms` output of `lake build AgentCore`, and every reported theorem must be
# claimed here exactly once. Hand-editing theorem names without a passing check is
# prohibited (SPEC §14).
edition: 2.0.0
formalScope: abstract-model-only
requirements:
