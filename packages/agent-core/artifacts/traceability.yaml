# Machine-verified against the Lean axiom report by `pnpm check:traceability`
# (scripts/check-traceability.mjs). Every name under `theorems:` must appear in the
# `#print axioms` output of `lake build AgentCore`, and every reported theorem must be
# claimed here exactly once. Hand-editing theorem names without a passing check is
# prohibited (SPEC §14).
edition: 2.0.0
formalScope: abstract-model-only
requirements:
  AC-AUTH-001:
    summary: Grant-chain authority attenuation (SPEC §3.4)
    status: proved-in-abstract-model
    definitions:
      - AgentCore.Authority.Subset
      - AgentCore.GrantChain
      - AgentCore.AuthorizedBy
    theorems:
      - AgentCore.grantChain_attenuates
      - AgentCore.delegated_authority_subset
      - AgentCore.authorized_authority_attenuates_to_root
    remainingEvidence:
      - concrete Grant storage and resolver refinement
  AC-AUTH-002:
    summary: Revocation monotonicity and descendant invalidation (SPEC §3.4)
    status: proved-in-abstract-model
    definitions:
      - AgentCore.LiveGrant
      - AgentCore.revoke
    theorems:
      - AgentCore.step_revocation_monotone
      - AgentCore.exec_revocation_monotone
      - AgentCore.revoked_ancestor_disables_descendant
    remainingEvidence:
      - live capability invalidation and disposal refinement
  AC-AUTH-003:
    summary: Binding and domain separation (SPEC §3.4)
    status: proved-in-abstract-model
    definitions:
      - AgentCore.Binding
      - AgentCore.AuthorizedBy
    theorems:
      - AgentCore.binding_cannot_cross_domains
      - AgentCore.same_binding_cannot_authorize_distinct_domains
      - AgentCore.authorized_tenant_isolation
    remainingEvidence:
      - concrete Binding resolver refinement
  AC-AUTH-004:
    summary: One authority plane — enforcement is invariant under membership records (SPEC §3.3)
    status: by-construction-witness
    note: >
      This theorem is definitional (Iff.rfl). It witnesses that the model admits no
      second enforcement path; it is not a deep proof and is not published as one.
    definitions:
      - AgentCore.ScopedState
      - AgentCore.ScopedState.AuthorizedBy
    theorems:
      - AgentCore.enforcement_independent_of_memberships
    remainingEvidence:
      - role-to-grant materialization step in the full transition system
  AC-SCOPE-001:
    summary: Scope-chain precedence — deny-overrides, downward flow, team union (SPEC §3.2/§3.3)
    status: proved-in-abstract-model
    definitions:
      - AgentCore.Scope
      - AgentCore.Scope.path
      - AgentCore.ScopeAuthority.Allowed
      - AgentCore.ScopeAuthority.DeniedOnPath
      - AgentCore.ScopeAuthority.Effective
    theorems:
      - AgentCore.Scope.self_mem_path
      - AgentCore.Scope.tenant_mem_path
      - AgentCore.Scope.path_preserves_tenant
      - AgentCore.ScopeAuthority.deny_overrides
      - AgentCore.ScopeAuthority.descendant_allow_cannot_rewiden
      - AgentCore.ScopeAuthority.allow_flows_down
      - AgentCore.ScopeAuthority.team_confers_member_access
    remainingEvidence:
      - guest membership attenuation (delegate/administer prohibition) in the model
      - integration of scope records into the Step transition system
  AC-REVOKE-001:
    summary: Bounded-window revocation epochs (SPEC §3.4 rule 5)
    status: proved-in-abstract-model
    definitions:
      - AgentCore.ResolutionStamp
      - AgentCore.ScopeAuthority.Fresh
      - AgentCore.ScopeAuthority.bumpEpoch
    theorems:
      - AgentCore.ScopeAuthority.bumpEpoch_epoch
      - AgentCore.ScopeAuthority.bumpEpoch_monotone
      - AgentCore.ScopeAuthority.bumpEpoch_advances
      - AgentCore.ScopeAuthority.bump_stales_stamp
      - AgentCore.ScopeAuthority.stale_stays_stale
    remainingEvidence:
      - invalidation-push and lease-expiry deadlines in the full transition system
      - reverse-index rebuildability
  AC-APPROVAL-001:
    summary: Approval continuation — digest-bound, single-use resume (SPEC §7.3)
    status: proved-in-abstract-model
    note: >
      The ledger LTS covers phase and digest binding; ComposedResumeOk (Composed.lean)
      joins it with authorization, readiness, and epoch freshness so the full SPEC
      §7.3 revalidation set is one proven property.
    definitions:
      - AgentCore.ApprovalTicket
      - AgentCore.ApprovalStep
      - AgentCore.ApprovalExec
      - AgentCore.ApprovalLedger.set
      - AgentCore.ComposedResumeOk
    theorems:
      - AgentCore.ApprovalLedger.set_lookup
      - AgentCore.resume_requires_approved_matching_digest
      - AgentCore.digest_mismatch_never_resumes
      - AgentCore.unapproved_never_resumes
      - AgentCore.denied_never_resumes
      - AgentCore.consumed_stable
      - AgentCore.no_resume_when_consumed
      - AgentCore.approval_single_use
      - AgentCore.composed_resume_guarantees
      - AgentCore.revocation_blocks_composed_resume
      - AgentCore.digest_mismatch_blocks_composed_resume
      - AgentCore.consumed_blocks_composed_resume
      - AgentCore.denied_blocks_composed_resume
    remainingEvidence:
      - SHA-256 digest binding in the implementation
