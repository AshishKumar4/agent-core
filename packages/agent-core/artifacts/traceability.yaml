  "assumptions": [
    {
      "id": "ASM-STRUCTURAL-DIGEST",
      "summary": "InvocationDigest is idealized as complete structural identity; canonical serialization and collision resistance are separate obligations.",
      "status": "operational-assumption"
    },
    {
      "id": "ASM-TRUTHFUL-VERIFICATION-INPUTS",
      "summary": "Verification, authentication, provenance, Principal, Actor, Tenant, and bridge-authority inputs supplied to the model are truthful.",
      "status": "operational-assumption"
    },
    {
      "id": "ASM-LIVENESS-TIME-INVALIDATION",
      "summary": "Time is monotonic and external invalidation is eventually delivered only for liveness; safety assumes neither delivery, fairness, nor progress.",
      "status": "operational-assumption"
    },
    {
      "id": "ASM-TRANSITION-ATOMICITY",
      "summary": "Each abstract transition is atomic and guarded writes linearize; concrete storage must establish this separately.",
      "status": "operational-assumption"
    },
    {
      "id": "ASM-SOURCE-PROJECTION-AUTHENTICITY",
      "summary": "The source Actor owns RouteReservation and the target accepts only an authenticated projection of that reservation.",
      "status": "operational-assumption"
    },
    {
      "id": "ASM-CLOSED-WORLD-TRANSITIONS",
      "summary": "The modeled transition and writer vocabularies are closed; no unmodeled mutation path changes modeled state.",
      "status": "operational-assumption"
    },
    {
      "id": "ASM-IMPLEMENTATION-REFINEMENT-SEPARATE",
      "summary": "Implementation conformance is established separately by SPEC evidence and tests, never inferred from theorem names or checker success.",
      "status": "refinement-non-goal"
    }
  ],
  "nonClaims": [
    {
      "id": "NC-SURFACE-RUNTIME-ACTIONS",
