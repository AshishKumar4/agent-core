  <rect x="674" y="278" width="152" height="46" rx="8" fill="#FBF3E4" stroke="#C9A15E"/>
  <text x="750" y="298" font-size="13px" fill="#1F2733" font-weight="600" text-anchor="middle">Turn</text>
